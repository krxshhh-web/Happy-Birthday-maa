<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Mom ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Main container */
.container {
    text-align: center;
    padding: 20px;
    width: 90%;
    max-width: 360px;
}

/* Paragraph */
p {
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 15px;
}

/* Big photo frame */
img {
    width: 100%;
    max-width: 320px;
    border-radius: 20px;
    border: 5px solid white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-top: 10px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    width: 80%;
}

/* Floating hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <p>
        Dear Mom ❤️<br><br>
        You are the most important person in my life.  
        Your love, care, and support mean everything to me.  
        I feel so lucky to have you as my mother.  
        Happy Birthday 💖
    </p>

    <!-- Your Photo -->
    <img src="/IMG_20260424_005838.jpg" alt="Mom">

  
</div>

<!-- Music -->


<script>


/* Floating hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 15) + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
